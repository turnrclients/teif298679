<!-- Sticky scroll logic -->
<script>
	$(window).on('scroll', function () {
		if ($(this).scrollTop() > 50) {
			$('header.header-52').addClass('sticky-active');
		} else {
			$('header.header-52').removeClass('sticky-active');
		}
	});
</script>


<section class="home-93 section-wrapper main-header-section">

    <div class="home-93-bg" style=" background: url('assets/images/home-67-bg.jpg') center/cover no-repeat;"></div>
    <div class="home-93-overlay"></div>

    <div class="home-93-inner">

        <h1 class="home-93-title">
            <span class="word">STRONGER</span>
        </h1>

        <h3 class="home-93-subtitle">TRANSFORM YOUR BODY</h3>

    </div>
</section>
<script>
gsap.registerPlugin(ScrollTrigger);

// =========================
// SCROLL TIMELINE (FIXED)
// =========================
let tl = gsap.timeline({
  scrollTrigger: {
    trigger: ".home-93",
    start: "top top",
    end: "+=800",
    scrub: true,
    pin: true,
    anticipatePin: 1,
    invalidateOnRefresh: true   // 👈 IMPORTANT FIX
  }
});

// ✅ ALWAYS DEFINE FROM → TO (IMPORTANT)
tl.fromTo(".home-93-bg",
  { scale: 1 },
  { scale: 1.5, ease: "none" },
  0
);

// TEXT (STRONGER)
tl.fromTo(".char",
  { y: 0, opacity: 1 },
  {
    y: -120,
    opacity: 0,
    stagger: 0.02,
    ease: "none"
  },
  0.2
);

// SUBTITLE
tl.fromTo(".home-93-subtitle",
  { y: 0, opacity: 1 },
  {
    y: -60,
    opacity: 0,
    ease: "none"
  },
  0.2
);
</script>
